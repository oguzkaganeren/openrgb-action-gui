name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenRGB Action GUI ${{ github.ref_name }}'
          releaseBody: |
            ## Changes in ${{ github.ref_name }}

            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ## Installation

            ### AppImage
            Download the `.AppImage` file, make it executable and run:
            ```bash
            chmod +x openrgb-action_*.AppImage
            ./openrgb-action_*.AppImage
            ```

            ### Debian/Ubuntu (.deb)
            ```bash
            sudo dpkg -i openrgb-action_*.deb
            ```

            ### RPM (Fedora/openSUSE)
            ```bash
            sudo rpm -i openrgb-action-*.rpm
            ```

            ### Arch Linux(Based)
            Install the `.deb` via `debtap`:
            ```bash
            # Install debtap if not already installed (AUR)
            yay -S debtap
            sudo debtap -u
            debtap openrgb-action_*.deb
            sudo pacman -U openrgb-action-*.pkg.tar.zst
            ```
            Or use the AppImage directly (no conversion needed).

            ## Requirements
            - OpenRGB must be installed and accessible in PATH
            - DBus session bus (standard on KDE/GNOME)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
